{% extends "base.html" %}
{% block content %}
<section class="login-page d-flex align-items-center justify-content-center p-3">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-4 col-md-6">
                <div class="card login-card p-4">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold text-primary">نظام إدارة الحضور والانصراف</h2>
                        <p class="text-muted mb-0">تسجيل الدخول إلى النظام</p>
                    </div>
                    <div id="loginAlert"></div>
                    <form id="loginForm">
                        <div class="mb-3">
                            <label class="form-label">اسم المستخدم</label>
                            <input id="username" class="form-control" autocomplete="username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">كلمة المرور</label>
                            <input id="password" type="password" class="form-control" autocomplete="current-password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">تسجيل الدخول</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
{% block scripts %}
<script src="/static/js/login.js"></script>
{% endblock %}
