{% extends "base.html" %}
{% block content %}
<div class="d-lg-flex main-wrapper">
    <aside class="sidebar p-3">
        <div class="text-white mb-4">
            <button class="btn btn-outline-light btn-sm mb-3" onclick="window.location.href='/'">
                <i class="bi bi-arrow-left-circle me-1"></i>الرجوع لاختيار الفرع
            </button>
            <h4 class="mb-1">نظام الحضور</h4>
            <small class="text-white-50"><span id="sidebarBranchName"></span></small>
        </div>
        <nav class="nav flex-column">
            <div class="sidebar-group">
                <button
                    type="button"
                    class="nav-link nav-toggle {% if page == 'departments' %}active{% endif %}"
                    id="departmentsNavToggle"
                    aria-expanded="false"
                    aria-controls="departmentsNavContainer"
                >
                    <span>إدارة الأقسام</span>
                    <span class="nav-toggle-icon" aria-hidden="true"></span>
                </button>
                <div id="departmentsNavContainer" class="nav-submenu" hidden>
                    <div id="departmentsNav" class="nav flex-column"></div>
                </div>
            </div>
            <a class="nav-link {% if page == 'employees' %}active{% endif %}" href="/employees">الموظفين</a>
            <a class="nav-link {% if page == 'devices' %}active{% endif %}" href="/devices">الأجهزة</a>
            <a class="nav-link {% if page == 'shifts' %}active{% endif %}" href="/shifts">الورديات</a>
            <a class="nav-link {% if page == 'attendance' %}active{% endif %}" href="/attendance">الحضور والانصراف</a>
            <a class="nav-link {% if page == 'monitoring' %}active{% endif %}" href="/monitoring">المراقبة</a>
            <a class="nav-link {% if page == 'reports' %}active{% endif %}" href="/reports">التقارير</a>
            <a class="nav-link {% if page == 'settings' %}active{% endif %}" href="/settings">الإعدادات</a>
            <a class="nav-link {% if page == 'backups' %}active{% endif %}" href="/backups">النسخ الاحتياطية</a>
            <button class="btn btn-outline-light mt-3" data-action="logout">تسجيل الخروج</button>
        </nav>
    </aside>
    <main class="content-area p-2 p-lg-3">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h2 class="fw-bold mb-0">{{ title }}</h2>
                <p class="text-muted small mb-0">{{ subtitle }}</p>
            </div>
            <div class="d-flex align-items-center gap-3">
                <!-- Branch Selector -->
                <div class="d-flex align-items-center gap-2">
                    <label class="text-muted small mb-0">الفرع:</label>
                    <select id="branchSelector" class="form-select form-select-sm" style="width: 200px;">
                        <option value="">جارٍ التحميل...</option>
                    </select>
                </div>
                <!-- Notification Dropdown -->
                <div class="dropdown">
                    <button class="btn btn-outline-secondary position-relative" type="button" data-bs-toggle="dropdown" id="notificationDropdown">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg>
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="unreadCount">0</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end" id="notificationDropdownMenu" style="max-height: 400px; overflow-y: auto;">
                        <li class="p-3 text-center text-muted">لا توجد إشعارات</li>
                    </ul>
                </div>
                <!-- User Info -->
                <div class="text-start">
                    <div class="small text-muted">مسجل الدخول باسم</div>
                    <div class="fw-semibold" id="currentUserName">مدير النظام</div>
                </div>
            </div>
        </div>
        {% block page_content %}{% endblock %}
    </main>
</div>
{% endblock %}
