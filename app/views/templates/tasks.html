{% extends "partials_layout.html" %}
{% set title = "المهام" %}
{% set subtitle = "إدارة ومتابعة المهام" %}
{% block page_content %}
<div id="tasksAlert"></div>

<div class="row g-4 mb-4">
    <div class="col-lg-4">
        <div class="card panel-card p-4" id="addTaskForm" style="display: none;">
            <h5 class="fw-bold mb-3">إضافة مهمة جديدة</h5>
            <form id="createTaskForm">
                <div class="mb-3">
                    <label class="form-label">العنوان</label>
                    <input id="createTaskTitle" type="text" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">الوصف</label>
                    <textarea id="createTaskDescription" class="form-control" rows="2"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">الموظف المخصص</label>
                    <select id="createTaskAssignedTo" class="form-select" required>
                        <option value="">-- اختر موظف --</option>
                    </select>
                </div>
                <div class="row g-3 mb-3">
                    <div class="col-lg-6">
                        <label class="form-label">الأولوية</label>
                        <select id="createTaskPriority" class="form-select">
                            <option value="low">منخفضة</option>
                            <option value="medium" selected>متوسطة</option>
                            <option value="high">عالية</option>
                        </select>
                    </div>
                    <div class="col-lg-6">
                        <label class="form-label">تاريخ الاستحقاق</label>
                        <input id="createTaskDueDate" type="date" class="form-control">
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-fill">إضافة</button>
                    <button type="button" class="btn btn-outline-secondary" id="cancelAddTask">إلغاء</button>
                </div>
            </form>
        </div>
        
        <div id="showAddTaskBtn" class="card panel-card p-4">
            <button class="btn btn-primary w-100" id="showAddTask">إضافة مهمة جديدة</button>
        </div>
    </div>
    
    <div class="col-lg-8">
        <div class="card panel-card p-4">
            <h5 class="fw-bold mb-3">قائمة المهام</h5>
            <div id="tasksContainer">
                <!-- Tasks will be loaded here -->
            </div>
        </div>
    </div>
</div>

<!-- Edit Task Modal -->
<div class="modal fade" id="editTaskModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="editTaskForm">
                <input type="hidden" id="editTaskId">
                <div class="modal-header">
                    <h5 class="modal-title">تعديل مهمة</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">العنوان</label>
                        <input id="editTaskTitle" type="text" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">الوصف</label>
                        <textarea id="editTaskDescription" class="form-control" rows="2"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">الموظف المخصص</label>
                        <select id="editTaskAssignedTo" class="form-select" required>
                            <option value="">-- اختر موظف --</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">الحالة</label>
                        <select id="editTaskStatus" class="form-select">
                            <option value="pending">قيد الانتظار</option>
                            <option value="in_progress">قيد التنفيذ</option>
                            <option value="completed">مكتملة</option>
                            <option value="cancelled">ملغاة</option>
                        </select>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-lg-6">
                            <label class="form-label">الأولوية</label>
                            <select id="editTaskPriority" class="form-select">
                                <option value="low">منخفضة</option>
                                <option value="medium">متوسطة</option>
                                <option value="high">عالية</option>
                            </select>
                        </div>
                        <div class="col-lg-6">
                            <label class="form-label">تاريخ الاستحقاق</label>
                            <input id="editTaskDueDate" type="date" class="form-control">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
                    <button type="submit" class="btn btn-primary">حفظ</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script src="/static/js/tasks.js"></script>
{% endblock %}
