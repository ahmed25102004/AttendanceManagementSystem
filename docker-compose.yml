version: '3.8'

services:
  # PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: verdebeautyclinic-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secure_postgres_password_123!
      POSTGRES_DB: attendance_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"  # Expose port for local development
    networks:
      - verdebeautyclinic-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application Service
  app:
    build: .
    container_name: verdebeautyclinic-app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
      - backups:/app/backups
    ports:
      - "8006:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:secure_postgres_password_123!@db:5432/attendance_db
      - APP_NAME=${APP_NAME}
      - APP_ENV=${APP_ENV}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - COMPANY_NAME=${COMPANY_NAME}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - verdebeautyclinic-network
    restart: unless-stopped

  # Portainer for Docker Management (optional, but nice for VPS)
  portainer:
    image: portainer/portainer-ce:latest
    container_name: verdebeautyclinic-portainer
    ports:
      - "9443:9443"
      - "8002:8000"
    volumes:
      - portainer_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - verdebeautyclinic-network
    restart: unless-stopped

networks:
  verdebeautyclinic-network:
    driver: bridge

volumes:
  postgres_data:
  backups:
  portainer_data:
